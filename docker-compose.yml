version: "3"
services:
  mongo:
    container_name: mongo-container
    image: mongo:latest
    restart: always
    volumes:
      - ./data: /data/db
    ports:
      - "27017:27017"
  api:
    container_name: survey-container    
    build: .
    restart: always
    image: survey-api
    command: npm start
    volumes:
      - ./build:/usr/src/survey-api
    ports:
      - "3000:3000"
    links:
      - mongodb

